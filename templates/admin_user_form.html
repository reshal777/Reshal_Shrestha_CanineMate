{% extends 'base_admin.html' %}
{% block title %}{{ title }} - Canine Mate Admin{% endblock %}

{% block content %}
<div class="welcome">
    <h1>{{ title }}</h1>
    <p>{% if user_obj %}Edit details for {{ user_obj.username }}{% else %}Add a new user to the platform{% endif %}</p>
</div>

<div class="panel" style="max-width: 800px; margin: 0 auto;">
    <form method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
        {% csrf_token %}

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-weight: 600; color: #374151;">First Name</label>
                <input type="text" name="first_name" value="{{ user_obj.first_name|default:'' }}"
                    style="padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-weight: 600; color: #374151;">Last Name</label>
                <input type="text" name="last_name" value="{{ user_obj.last_name|default:'' }}"
                    style="padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-weight: 600; color: #374151;">Email Address *</label>
                <input type="email" name="email" value="{{ user_obj.email|default:'' }}" required
                    style="padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-weight: 600; color: #374151;">Username *</label>
                <input type="text" name="username" value="{{ user_obj.username|default:'' }}" required
                    style="padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;">
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="font-weight: 600; color: #374151;">
                Password {% if user_obj %}(Leave blank to keep current password){% else %}*{% endif %}
            </label>
            <input type="password" name="password" {% if not user_obj %}required{% endif %}
                style="padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem;">
        </div>

        <div style="display: flex; gap: 2rem; margin-top: 0.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" name="is_staff" {% if user_obj.is_staff %}checked{% endif %}
                    style="width: 18px; height: 18px;">
                <span style="font-weight: 500; color: #374151;">Is Staff/Admin</span>
            </label>

            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" name="is_active" {% if not user_obj or user_obj.is_active %}checked{% endif %}
                    style="width: 18px; height: 18px;">
                <span style="font-weight: 500; color: #374151;">Is Active</span>
            </label>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn-add" style="flex: 1; padding: 0.75rem;">
                {% if user_obj %}Update User{% else %}Create User{% endif %}
            </button>
            <a href="{% url 'admin_users' %}" class="btn-add"
                style="background: #f3f4f6; color: #4b5563; flex: 1; padding: 0.75rem; text-align: center;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
