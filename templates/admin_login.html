{% extends 'base/base.html' %}
{% block title %}Admin Login - Canine Mate{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 p-6 bg-white rounded-xl shadow-lg">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-[#333333]">Admin Panel Access</h2>
        <p class="text-gray-600 mt-2">Sign in to manage the platform</p>
    </div>

    {% if messages %}
    <div class="mb-4 space-y-2">
        {% for message in messages %}
        <div
            class="p-3 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'admin_login' %}">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email or Username</label>
            <input type="text" name="email" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#4FBDBA] focus:border-[#4FBDBA]">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#4FBDBA] focus:border-[#4FBDBA]">
        </div>
        <button type="submit"
            class="w-full bg-[#4FBDBA] text-white py-2 px-4 rounded-lg hover:bg-[#3da5a2] transition duration-200 font-semibold">
            Login to Admin
        </button>
    </form>
</div>
{% endblock %}
