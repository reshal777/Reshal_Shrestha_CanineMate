<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Canine Mate{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #4FBDBA 0%, #3da5a2 100%);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
        }

        .overlay-gradient {
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
        }

        .nav-blur {
            backdrop-filter: blur(12px);
        }

        .hover-lift {
            transition: all 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-5px);
        }

        .hover-scale {
            transition: transform 0.3s ease;
        }

        .hover-scale:hover {
            transform: scale(1.05);
        }

        .smooth-scroll {
            scroll-behavior: smooth;
        }

        .hover-gap-3:hover .arrow-icon {
            margin-left: 0.75rem;
        }

        .arrow-icon {
            transition: margin-left 0.3s ease;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-[#FAFAF7] smooth-scroll">
    {% include 'base/navbar.html' %}

    <main class="pt-20">
        {% if messages %}
        <div id="django-messages" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4" style="transition: opacity 0.5s ease, transform 0.5s ease;">
            {% for message in messages %}
            <div class="p-4 rounded-md {% if message.tags == 'success' %}bg-green-100 text-green-700{% elif message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %} mb-4">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        <script>
            setTimeout(function() {
                const msgs = document.getElementById('django-messages');
                if (msgs) {
                    msgs.style.opacity = '0';
                    msgs.style.transform = 'translateY(-8px)';
                    setTimeout(function() { msgs.remove(); }, 500);
                }
            }, 3000);
        </script>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    {% include 'base/footer.html' %}

    {% block extra_js %}{% endblock %}

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
