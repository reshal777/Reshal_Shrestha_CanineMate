<!-- Navigation -->
<nav class="bg-white/80 nav-blur fixed w-full top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">
            <div class="flex items-center gap-2">
                <a href="/" class="flex items-center gap-2">
                    <img src="/static/logo.png" alt="Canine Mate Logo" class="h-8">
                    <span class="text-2xl font-semibold text-[#333333]">Canine Mate</span>
                </a>
            </div>

            <div class="hidden md:flex items-center gap-8">
                <a href="/" class="text-[#333333] hover:text-[#4FBDBA] transition-colors">Home</a>
                <a href="/#services" class="text-[#333333] hover:text-[#4FBDBA] transition-colors">Services</a>
                <a href="{% url 'adoption' %}"
                    class="text-[#333333] hover:text-[#4FBDBA] transition-colors">Adoption</a>
                <a href="{% url 'shop' %}" class="text-[#333333] hover:text-[#4FBDBA] transition-colors">Shop</a>
                <a href="{% url 'contact' %}" class="text-[#333333] hover:text-[#4FBDBA] transition-colors">Contact</a>
            </div>

            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                <!-- User Profile Dropdown -->
                <div class="relative ml-3" id="user-menu-container">
                    <div>
                        <button type="button"
                            class="flex max-w-xs items-center rounded-full bg-white text-sm focus:outline-none focus:ring-2 focus:ring-[#4FBDBA] focus:ring-offset-2 transition-all hover:scale-105"
                            id="user-menu-button" aria-expanded="false" aria-haspopup="true">
                            <span class="sr-only">Open user menu</span>
                            <div
                                class="h-10 w-10 rounded-full border-2 border-[#4FBDBA] p-0.5 transition-colors hover:border-[#3da5a2]">
                                <img class="h-full w-full rounded-full object-cover"
                                    src="https://ui-avatars.com/api/?name={{ user.username }}&background=4FBDBA&color=fff"
                                    alt="User avatar">
                            </div>
                        </button>
                    </div>

                    <!-- Dropdown menu -->
                    <div class="absolute right-0 z-10 mt-2 w-64 origin-top-right rounded-2xl bg-white py-2 shadow-2xl ring-1 ring-black ring-opacity-5 focus:outline-none opacity-0 scale-95 pointer-events-none transition-all duration-200 ease-out"
                        id="user-dropdown" role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button"
                        tabindex="-1">

                        <!-- Header with user info -->
                        <div class="px-4 py-3 border-b border-gray-100 mb-1">
                            <p class="text-sm font-medium text-[#333333] truncate">{{ user.username }}</p>
                            <p class="text-xs text-gray-500 truncate">{{ user.email }}</p>
                        </div>

                        <!-- Menu items -->
                        <a href="#"
                            class="group flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-[#FAFAF7] transition-colors"
                            role="menuitem" tabindex="-1" id="user-menu-item-0">
                            <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-[#4FBDBA] transition-colors"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            Edit Profile
                        </a>
                        <a href="{% url 'dashboard' %}"
                            class="group flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-[#FAFAF7] transition-colors"
                            role="menuitem" tabindex="-1" id="user-menu-item-1">
                            <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-[#4FBDBA] transition-colors"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                                </path>
                            </svg>
                            Dashboard
                        </a>
                        <a href="{% url 'chat_list' %}"
                            class="group flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-[#FAFAF7] transition-colors"
                            role="menuitem" tabindex="-1" id="user-menu-item-messages">
                            <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-[#4FBDBA] transition-colors"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                                </path>
                            </svg>
                            Messages
                        </a>
                        <a href="#"
                            class="group flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-[#FAFAF7] transition-colors"
                            role="menuitem" tabindex="-1" id="user-menu-item-2">
                            <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-[#4FBDBA] transition-colors"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                                </path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            Settings & Privacy
                        </a>

                        <div class="border-t border-gray-100 mt-1">
                            <a href="{% url 'logout' %}"
                                class="group flex items-center px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-all font-medium"
                                role="menuitem" tabindex="-1" id="user-menu-item-logout">
                                <svg class="mr-3 h-5 w-5 text-red-400 group-hover:text-red-600 transition-colors"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                    </path>
                                </svg>
                                Logout
                            </a>
                        </div>
                    </div>
                </div>

                <script>
                    document.addEventListener('DOMContentLoaded', () => {
                        const userMenuButton = document.getElementById('user-menu-button');
                        const userDropdown = document.getElementById('user-dropdown');

                        const toggleDropdown = () => {
                            const isOpen = !userDropdown.classList.contains('opacity-0');
                            if (isOpen) {
                                userDropdown.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                                userDropdown.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
                            } else {
                                userDropdown.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                                userDropdown.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
                            }
                        };

                        if (userMenuButton && userDropdown) {
                            userMenuButton.addEventListener('click', (e) => {
                                e.stopPropagation();
                                toggleDropdown();
                            });

                            document.addEventListener('click', (e) => {
                                if (!userMenuButton.contains(e.target) && !userDropdown.contains(e.target)) {
                                    userDropdown.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                                    userDropdown.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
                                }
                            });
                        }
                    });
                </script>

                {% else %}
                <a href="{% url 'login' %}"
                    class="text-[#333333] hover:text-[#4FBDBA] transition-colors font-medium">Login</a>
                <a href="{% url 'signup' %}"
                    class="bg-[#333333] text-white px-6 py-2.5 rounded-full hover:bg-[#4FBDBA] transition-all font-semibold">Sign
                    Up</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
