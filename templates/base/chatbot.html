<!-- Chatbot Bubble and Window -->
<div id="chatbot-container" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
    <!-- Chat Window -->
    <div id="chatbot-window" class="hidden w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-gray-100 flex-col overflow-hidden mb-4 transition-all duration-300 transform scale-95 opacity-0 origin-bottom-right">
        <!-- Header -->
        <div class="gradient-bg p-4 flex justify-between items-center text-white">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-full backdrop-blur-md">
                    <i data-lucide="bot" class="w-5 h-5"></i>
                </div>
                <div>
                    <h3 class="font-semibold text-sm">CanineMate AI</h3>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
                        <span class="text-[10px] text-white/80">Always active</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" class="h-[400px] overflow-y-auto p-4 space-y-4 bg-[#F8FAFC]">
            <!-- AI Welcome Message -->
            <div class="flex items-start gap-2.5">
                <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-4 h-4 text-white"></i>
                </div>
                <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 max-w-[80%]">
                    <p class="text-sm text-gray-700 leading-relaxed">
                        Woof! 🐾 I'm your CanineMate assistant. How can I help you and your furry friend today?
                    </p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-gray-100">
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="chat-input" 
                    placeholder="Ask anything about pet care..." 
                    class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#4FBDBA]/20 focus:border-[#4FBDBA] transition-all"
                    autocomplete="off">
                <button type="submit" 
                    class="gradient-bg text-white p-2.5 rounded-xl hover:shadow-lg hover:shadow-[#4FBDBA]/20 transition-all flex items-center justify-center disabled:opacity-50"
                    id="send-btn">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Toggle Button -->
    <button id="chatbot-toggle" 
        class="gradient-bg text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center hover:scale-110 active:scale-95 transition-all duration-300">
        <i data-lucide="message-circle" class="w-6 h-6" id="toggle-icon"></i>
    </button>
</div>

<style>
    #chat-messages::-webkit-scrollbar {
        width: 4px;
    }
    #chat-messages::-webkit-scrollbar-track {
        background: transparent;
    }
    #chat-messages::-webkit-scrollbar-thumb {
        background: #E2E8F0;
        border-radius: 10px;
    }
    .typing-indicator span {
        width: 4px;
        height: 4px;
        background-color: #94A3B8;
        display: inline-block;
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
    .chatbot-markdown {
        white-space: pre-line;
    }
    .chatbot-markdown p {
        margin-bottom: 0.5rem;
    }
    .chatbot-markdown p:last-child {
        margin-bottom: 0;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggleBtn = document.getElementById('chatbot-toggle');
    const chatWindow = document.getElementById('chatbot-window');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('send-btn');

    let isOpen = false;

    // Toggle Window
    function toggleChat() {
        isOpen = !isOpen;
        if (isOpen) {
            chatWindow.classList.remove('hidden');
            setTimeout(() => {
                chatWindow.classList.remove('scale-95', 'opacity-0');
                chatWindow.classList.add('scale-100', 'opacity-100');
            }, 10);
            chatInput.focus();
        } else {
            chatWindow.classList.remove('scale-100', 'opacity-100');
            chatWindow.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                chatWindow.classList.add('hidden');
            }, 300);
        }
    }

    toggleBtn.addEventListener('click', toggleChat);

    // Add Message to UI
    function addMessage(text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `flex ${isUser ? 'justify-end' : 'items-start'} gap-2.5`;
        
        const content = isUser ? `
            <div class="bg-[#4FBDBA] text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[80%]">
                <p class="text-sm leading-relaxed">${text}</p>
            </div>
        ` : `
            <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                <i data-lucide="bot" class="w-4 h-4 text-white"></i>
            </div>
            <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 max-w-[80%]">
                <div class="text-sm text-gray-700 leading-relaxed chatbot-markdown">${text}</div>
            </div>
        `;
        
        messageDiv.innerHTML = content;
        chatMessages.appendChild(messageDiv);
        lucide.createIcons();
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Typing Indicator
    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typing-indicator';
        typingDiv.className = 'flex items-start gap-2.5';
        typingDiv.innerHTML = `
            <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                <i data-lucide="bot" class="w-4 h-4 text-white"></i>
            </div>
            <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100">
                <div class="typing-indicator flex gap-1 items-center h-4">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        chatMessages.appendChild(typingDiv);
        lucide.createIcons();
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return typingDiv;
    }

    // Handle Form Submit
    chatForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;

        // UI Updates
        addMessage(message, true);
        chatInput.value = '';
        chatInput.disabled = true;
        sendBtn.disabled = true;

        const typingIndicator = showTyping();

        try {
            const response = await fetch("{% url 'chatbot_api' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            typingIndicator.remove();

            if (data.response) {
                addMessage(data.response);
            } else {
                addMessage("I'm sorry, I'm having a bit of trouble connecting right now. 🐾");
                console.error('Chatbot error:', data.error);
            }
        } catch (error) {
            typingIndicator.remove();
            addMessage("Oops! Something went wrong. Please try again later. 🐾");
            console.error('Fetch error:', error);
        } finally {
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }
    });

    // Helper for CSRF
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});
</script>
