<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Canine Mate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-[#FAFAF7] font-sans min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="p-8">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-[#4FBDBA] to-[#3da5a2] rounded-2xl flex items-center justify-center mb-4 shadow-lg">
                    <i data-lucide="paw-print" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-[#333333]">Admin Panel</h1>
                <p class="text-gray-500 text-sm">Please sign in to continue</p>
            </div>

            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for message in messages %}
                        {% if "Product created successfully" not in message.message %}
                        <div class="p-4 rounded-xl {% if message.tags == 'success' %}bg-green-50 text-green-600{% else %}bg-red-50 text-red-600{% endif %} text-sm font-medium">
                            {{ message }}
                        </div>
                        {% endif %}
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-600 ml-1">Email or Username</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="text" name="email" required 
                            class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#4FBDBA] focus:bg-white outline-none transition-all"
                            placeholder="admin@caninemate.com">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-600 ml-1">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" name="password" required 
                            class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#4FBDBA] focus:bg-white outline-none transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full py-4 bg-gradient-to-r from-[#4FBDBA] to-[#3da5a2] text-white font-bold rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all outline-none">
                    Sign In
                </button>
            </form>
        </div>
        <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
            <a href="{% url 'index' %}" class="text-sm text-gray-500 hover:text-[#4FBDBA] transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Back to Website
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
